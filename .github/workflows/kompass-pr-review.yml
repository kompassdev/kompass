name: Kompass PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.KOMPASS_APP_ID }}
          private-key: ${{ secrets.KOMPASS_APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.token.outputs.token }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Kompass Tooling
        uses: ./.github/actions/kompass-opencode-install

      - name: Run Kompass PR Review
        env:
          GITHUB_TOKEN: ${{ steps.token.outputs.token }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: opencode run --model="${{ vars.OPENCODE_MODEL }}" --variant="${{ vars.OPENCODE_VARIANT }}" --thinking --command="pr/review" "${{ github.event.pull_request.html_url }}"

      - name: Export Kompass Session
        if: always()
        uses: ./.github/actions/kompass-opencode-session-export
