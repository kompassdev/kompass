name: OpenCode Ticket Dev

on:
  workflow_dispatch:
    inputs:
      ticket:
        description: 'Ticket identifier or URL'
        required: true
        type: string

jobs:
  dev:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install OpenCode
        uses: ./.github/actions/opencode-install

      - name: Run Ticket Dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: opencode run --command="ticket/dev" --model="${{ vars.OPENCODE_MODEL }}" --variant="${{ vars.OPENCODE_VARIANT }}" --show-thinking
