name: OpenCode Ticket Plan

on:
  workflow_dispatch:
    inputs:
      ticket:
        description: 'Ticket identifier or URL'
        required: true
        type: string

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup OpenCode
        run: bun add -g @opencode-ai/opencode

      - name: Run Ticket Plan
        env:
          OPENCODE_MODEL: ${{ vars.OPENCODE_MODEL }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: opencode run --command="ticket/plan"
